<!-- sound-tuning.html — outil dev de réglage des volumes. À placer à la racine du projet, à côté de index.html (pour que ./src/assets.mjs et les chemins assets/sounds/... résolvent correctement). -->
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Réglage des sons — Sixty-Below</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { font-size: 1.3rem; margin-bottom: 1.25rem; }
    .global {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1px solid #444;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .global label { font-weight: 600; min-width: 9rem; }
    .global input[type="range"] { flex: 1; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.75rem;
    }
    .sound {
      border: 1px solid #444;
      border-radius: 8px;
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .sound button {
      padding: 0.45rem;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1px solid #666;
      border-radius: 6px;
      background: #2a2a2a;
      color: #e0e0e0;
    }
    .sound button:hover { background: #3a3a3a; }
    .row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
    .row input[type="range"] { flex: 1; }
    .row output { min-width: 2.5em; text-align: right; font-variant-numeric: tabular-nums; }
    #status { color: #999; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Réglage des sons — Sixty-Below</h1>

  <div class="global">
    <label for="global-volume">Volume général</label>
    <input type="range" id="global-volume" min="0" max="100" value="100">
    <output id="global-volume-value">100</output>
  </div>

  <p id="status">Chargement des sons…</p>
  <div class="grid" id="sounds"></div>

  <script type="module">
    import {soundManager, SOUND_FILES, SOUND_CACHE, SOUND_VOLUMES} from './src/assets.mjs'

    const globalSlider = document.getElementById('global-volume')
    const globalValue = document.getElementById('global-volume-value')
    globalSlider.addEventListener('input', () => {
      const v = Number(globalSlider.value)
      globalValue.textContent = v
      soundManager.onSoundVolume(v)
    })

    await Promise.all(soundManager.loadSounds())
    document.getElementById('status').remove()

    const container = document.getElementById('sounds')

    for (const path of SOUND_FILES) {
      const name = path.substring(path.lastIndexOf('/') + 1, path.lastIndexOf('.'))
      if (SOUND_CACHE[name] === undefined) continue // chargement échoué — pas de bouton

      const card = document.createElement('div')
      card.className = 'sound'

      const button = document.createElement('button')
      button.textContent = name
      button.addEventListener('click', () => soundManager.playSound(name))

      const row = document.createElement('div')
      row.className = 'row'

      const slider = document.createElement('input')
      slider.type = 'range'
      slider.min = '0'
      slider.max = '100'
      slider.value = String(SOUND_VOLUMES[name] ?? 100)

      const value = document.createElement('output')
      value.textContent = slider.value

      slider.addEventListener('input', () => {
        const v = Number(slider.value)
        value.textContent = v
        SOUND_VOLUMES[name] = v
      })

      row.append(slider, value)
      card.append(button, row)
      container.append(card)
    }
  </script>
</body>
</html>
